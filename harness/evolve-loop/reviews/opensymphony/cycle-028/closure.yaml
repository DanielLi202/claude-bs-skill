- id: C2
  from: cycle-028 r2
  title: Human semantic check for fail-closed security-containment proof tests
  determinism: needs_human
  target: bs-skill/prompts/grade/role.md + prompts/grade/critic.md
  change: For P0/P1 security-containment proof tests, Grade/critic must inspect the
    source/test branch semantics and FAIL if the test can return success before exercising
    the hostile action under the asserted primitive, or if the unavailable/inactive
    primitive path does not make the proof fail/refuse. Green nextest on an active
    host is NOT sufficient. Irreducible residual of cycle-028 F1 (the proof test fail-OPENs
    when sandbox-exec is inactive) — the deterministic C1 evidence-shape rule (v1.4.27)
    requires the grade text to ASSERT forced-unavailable fail-closed proof, but cannot
    verify the Rust test actually does it.
  addresses:
  - F1
- id: C4
  from: cycle-028 r2
  title: Human code-aware check for PATH-resolved trusted containment binaries
  determinism: needs_human
  target: bs-skill/prompts/grade/role.md + prompts/grade/critic.md
  change: When a Grade passes a security property that depends on a trusted local
    binary, the trust-boundary review must inspect production AND probe call sites
    for PATH resolution vs the discovered absolute path, and require a PATH-precedence/fake-binary
    negative or direct source evidence. grade_lint cannot prove this from text. Irreducible
    residual of cycle-028 F2 (sandbox_exec_path() finds the absolute binary but Command::new("sandbox-exec")
    invokes via PATH) — the deterministic C3 evidence-shape rule requires the grade
    text to cite absolute-path invocation, but cannot verify the code does it.
  addresses:
  - F2
- id: C5
  from: cycle-028 r2 (re-classified by orchestrator)
  title: MCP-wedge mitigation for staged codex runs — proposed mechanism verified
    ineffective
  determinism: needs_human
  target: bs-skill/harness/evolve-loop/bin/run-codex-staged.sh
  change: 'r2 proposed passing `-c mcp_servers={}` to codex exec so review stages
    cannot wedge on an unauthenticated configured MCP (a remote tavily MCP needing
    TAVILY_API_KEY, absent in the headless loop context, blocked the first cycle-028
    r1 codex run at 0% CPU for 68min). ORCHESTRATOR VERIFIED THIS IS INEFFECTIVE:
    with `-c mcp_servers={}` the `Auth(AuthorizationRequired)` error still appears
    (codex merges the empty table rather than clearing the [mcp_servers.*] sub-tables)
    — so it does not actually disable MCP. The clean `--ignore-user-config` flag disables
    MCP but drops ALL user config (model/effort side-effect risk). The wedge is rare+transient
    (non-fatal; r1b and r2 both produced full reviews despite the error; ~1-in-10
    runs). NEEDS: the correct per-run MCP disable that preserves the account model
    + reasoning effort, OR a run-codex-staged.sh stall-detector improvement that catches
    a log-FROZEN wedge even when intermittent CPU ticks keep last_progress fresh (the
    actual failure mode — the existing all-quiet stall threshold did not fire). Deferred
    from deterministic implementation because shipping an ineffective/risky change
    to the loop''s critical wrapper mid-run is worse than none; current mitigation
    = the orchestrator''s check-in wakes catch a wedge.'
