release: v1.4.21
baseline_ref: v1.4.20
target_cycle: cycle-025
adjudications:
  - fire: "frontend_pessimistic_command_matrix[execute] + [re_shape] on cycle-022 grade_round_3.md (initial backtest run; 2 delta errors)"
    verdict: false_positive
    rationale: >-
      cycle-022 (B-022 "UI-M0 Contract substrate — Tauri/React scaffold + SSE/SWR + If-Match
      client") delivered the CLIENT/TRANSPORT layer: a typed If-Match wrapper and a commandPolicy
      table with unit tests. It shipped NO interactive command UI (no buttons, no pending states,
      no inline error regions for execute/re-shape — those surfaces arrived in later UI milestones).
      The facet demands UI-interaction evidence (pending_or_scoped_disable, inline_error,
      catch_or_failure_handling), which would have been evidence for UI that was explicitly out of
      cycle-022's scope. The original trigger (command name within 220 chars of
      PESSIMISTIC/DA-28/29/If-Match context) is satisfied by pure wrapper/policy-table claims, so
      the in-scope predicate was over-broad — exactly the over-broad-lint risk r2's net_risk row
      warned about.
    evidence_quotes:
      - "cycle-022 cycle.yaml title: 'UI-M0 Contract substrate — Tauri/React scaffold + SSE/SWR + If-Match client'"
      - "grade_round_3.md a5 row: 'stage commands always send If-Match; missing revision rejects with client_missing_revision; optional commands per contract' — wrapper behavior, no UI affordance"
      - "grade_round_3.md a7 row: 'commandPolicy asserts the full api-contract §4.0 matrix … If-Match required exactly on execute/approve/re-shape/cancel' — a policy TABLE assertion via unit test, not a command surface"
      - "outcome.md a63 claim names execute/approve/re-shape/cancel solely as stage-transition WRITES carrying If-Match (client contract), with no button/render/screen/region claim in context"
    action: >-
      Rule refined in commit c889b84: frontend_command_named_in_pessimistic_scope now also requires
      a UI-affordance token (button/click/onClick/render/screen/card/panel/region/modal/affordance/
      footer/drawer) in the same 220-char command context window, distinguishing "implemented the
      command UI" (cycle-025: 'renders primary Approve & start Conduct + secondary Re-shape',
      'inline conflict copy', scoped-disabled region) from "implemented the client wrapper/policy
      table" (cycle-022). Added must-not-fire regression fixture from cycle-022's real grade/outcome
      text (test_cycle022_command_substrate_does_not_fire_pessimistic_command_matrix). Re-run
      backtest: must_fire(cycle-025)=True, misfire_candidates=0 across all 13 corpus cycles.
